        correctly delegates downward to domain.
    - id: application-bootstrap-registration
      status: info
      evidence: >-
        GetRemainingQuotaUseCase not appended to applicationUseCaseProviders in _bootstrap.ts;
        tRPC uses createGetRemainingQuotaUseCase(ctx) factory instead of Nest DI.
    - id: dead-db-param
      status: info
      evidence: >-
        GetRemainingQuotaParams.db is voided in use case; events.router still validates and
        passes ctx.connection.db while CommunityService uses this.mongoose.db internally.

  attempt_delta_from_prior:
    - id: attempt-0-use-case-in-use-case
      status: resolved
      evidence: >-
        Attempt 1 moved duplicate aggregation out of get-remaining-quota.use-case.ts into
        CommunityService.aggregateQuotaUsedSince; use case refactored to domain delegate.
    - id: attempt-0-publication-shim-wiring
      status: resolved
      evidence: >-
        publication-creation-quota.ts no longer wires use-case factory; delegates directly
        to communityService.getRemainingPublicationCreateQuota.

  findings:
    - id: v01-document-variant-unmigrated
      severity: blocker
      message: >-
        document-variant.service.ts still imports trpc/helpers/publication-creation-quota;
        V-01 waiver not closed despite work-unit constraint closes_waiver: V-01.
    - id: p3-router-duplication-persists
      severity: blocker
      message: >-
        Intent names wallets.router and polls.router retirement; both still contain full
