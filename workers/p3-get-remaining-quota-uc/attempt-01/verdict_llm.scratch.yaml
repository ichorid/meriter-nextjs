    success criteria remain open: document-variant.service.ts still has the Zone-1 import,
    polls/votes/wallets routers retain inline duplication, and authoritative calculation
    lives in CommunityService rather than the use case.
  reviewed_at: "2026-05-28"
  diff_basis: >-
    Uncommitted git diff on branch refactor/p3-get-remaining-quota-uc
    (git diff HEAD~..HEAD reflects unrelated p2-vote-comment-resolver-adapter commit;
    work-unit delta reviewed via git diff on the four write_set files plus direct reads
    of get-remaining-quota.use-case.ts and downstream consumers).

  intent_match: partial
  write_set_compliance: true
  files_modified:
    - api/apps/meriter/src/application/use-cases/wallets/get-remaining-quota.use-case.ts
    - api/apps/meriter/src/trpc/helpers/publication-creation-quota.ts
    - api/apps/meriter/src/domain/services/community.service.ts
    - api/apps/meriter/src/trpc/routers/events.router.ts

