      evidence: >-
        New application use case at application/use-cases/wallets/get-remaining-quota.use-case.ts;
        tRPC routers and helpers delegate toward application/domain entry points.
    - id: bounded_contexts-BC-02
      status: pass
      evidence: >-
        CommunityService methods document BC-02 inv-02 (getQuotaStartTime,
        getPublicationCreateDailyCap, getDailyEmissionCapForQuota, computeRemainingQuota,
        getRemainingPublicationCreateQuota, getRemainingDailyEmissionQuota).
    - id: duplication_clusters-P-3
      status: partial
      evidence: >-
        Inline aggregation retired in publication-creation-quota.ts and consolidated into
        CommunityService.aggregateQuotaUsedSince; getCommunityMembers uses shared cap/remaining
        helpers. Duplicated ~80–120 line getRemainingQuota helpers remain in polls.router.ts,
        votes.router.ts, and inline aggregation in wallets.router.ts (getQuota, batch quota,
        getFreeBalance).
    - id: invariants-inv-02
      status: pass
      evidence: >-
        Quota window (getQuotaStartTime), cap derivation, used aggregation, and
        computeRemainingQuota are centralized in CommunityService for write_set paths;
        behavior preserved for publication-create and dailyEmission member-list paths.
    - id: retirement_criteria-P-3
      status: partial
      evidence: >-
        Write_set duplication sites retired; P-3 cluster not fully eliminated codebase-wide.
    - id: closes_waiver-V-02
      status: pass
      evidence: >-
        events.router.ts imports createGetRemainingQuotaUseCase from application layer;
        no import of trpc/helpers/publication-creation-quota. createEvent calls
        getRemainingQuota.forPublicationCreate({...}) at lines 71–82 and 105–112.
    - id: closes_waiver-V-01
      status: fail
      evidence: >-
        document-variant.service.ts:33 still imports getRemainingQuotaForPublicationCreate
        from trpc/helpers/publication-creation-quota (Zone-1 domain→trpc waiver). Domain
        API communityService.getRemainingPublicationCreateQuota exists but consumer not migrated.

  success_criteria:
    - id: single_use_case_owns_remaining_quota_calculation
      status: partial
      evidence: >-
        GetRemainingQuotaUseCase is a thin facade (forPublicationCreate/forDailyEmission
        delegate to CommunityService; void params.db). Authoritative aggregation and cap
        math live in CommunityService.aggregateQuotaUsedSince and related helpers, not in
        the use case class. Zone-8 compliant but criterion wording not literally satisfied.
    - id: routers_delegate_to_use_case
      status: partial
      evidence: >-
        events.router delegates via createGetRemainingQuotaUseCase(ctx).forPublicationCreate.
        publications.router still calls getRemainingQuotaForPublicationCreate tRPC shim
        (→ CommunityService, bypassing use case). polls.router, votes.router, wallets.router
        retain local inline getRemainingQuota / aggregation helpers.
    - id: V-01_closed
      status: fail
      evidence: >-
        document-variant.service.ts lines 854 and 878 still call getRemainingQuotaForPublicationCreate
        imported from trpc layer; architecture.mdc V-01 waiver remains active.
    - id: V-02_closed
      status: pass
      evidence: >-
        events.router.ts quota-helper import retired; uses GetRemainingQuotaUseCase factory.
    - id: P-3_retirement_criterion_met
      status: partial
      evidence: >-
        publication-creation-quota.ts reduced from ~115 lines of inline math to ~30-line
        CommunityService delegate; getCommunityMembers inline cap/remaining math extracted.
        polls/votes/wallets routers and document-variant consumer not migrated.

  architecture_alignment:
    - id: zone-8-domain-no-application-import
      status: pass
      evidence: >-
        Calculation placed in CommunityService so domain consumers (document-variant once
