      severity: info
      message: >-
        publications.router uses tRPC shim getRemainingQuotaForPublicationCreate rather than
        createGetRemainingQuotaUseCase; behavior equivalent via CommunityService delegate.
    - id: uncommitted-changes
      severity: info
      message: >-
        Work-unit changes are uncommitted; get-remaining-quota.use-case.ts is untracked under
        application/use-cases/wallets/.

  blockers:
