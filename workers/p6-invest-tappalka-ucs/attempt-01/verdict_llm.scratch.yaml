    - id: use_cases_referenced_from_routers
      status: pass
    - id: tsc_errors_in_changed_files
      status: pass
      evidence: npx tsc --noEmit -p apps/meriter/tsconfig.app.json reports no errors on changed paths.

  findings:
    - id: tappalka-trpc-error-in-use-case
      severity: warning
      message: >-
        ProcessTappalkaComparisonUseCase should throw Nest/domain exceptions (as InvestInPostUseCase
        does) and let tappalka.router map codes; current TRPCError usage couples application layer
        to tRPC and interacts badly with the router Error catch-all.
    - id: tappalka-forbidden-remapped
      severity: warning
      message: >-
        tappalka.router submitChoice catch block wraps every Error as BAD_REQUEST, so new inv-08
        FORBIDDEN membership denial is surfaced as BAD_REQUEST to clients.
    - id: router-wiring-outside-write-set
      severity: info
      message: >-
        investment.router.ts and tappalka.router.ts modified outside nominal write_set; required
        to satisfy investments.invest / tappalka.submitChoice delegation success criterion.
    - id: investment-service-duplicate-logic
      severity: info
      message: >-
        InvestmentService.processInvestment retains parallel invest logic without inv-08 membership
        gate; only tRPC path uses InvestInPostUseCase. Consolidation deferred per worker notes.

  warnings:
