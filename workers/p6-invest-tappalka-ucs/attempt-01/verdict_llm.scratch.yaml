VerifierVerdict:
  work_unit_id: p6-invest-tappalka-ucs
  attempt: 1
  channel: llm
  verdict: partial
  summary: >-
    InvestInPostUseCase and ProcessTappalkaComparisonUseCase are extracted with inv-08
    permission gates and solvency pre-checks before side effects. investment.invest and
    tappalka.submitChoice delegate to factory-wired use cases. Router wiring sits outside
    the nominal write_set but is required for delegation. investment.e2e-spec.ts still
    fails at Nest bootstrap with a preexisting DI stack overflow (reproduced independently
    of this delta). Tappalka use case throws TRPCError in the application layer and the
    router catch-all remaps FORBIDDEN/NOT_FOUND to BAD_REQUEST.
  reviewed_at: "2026-05-28"
  diff_basis: >-
    Uncommitted git diff on branch refactor/p6-invest-tappalka-ucs (git diff HEAD~..HEAD
    reflects unrelated p5-permission-engine-merge commit; work-unit delta reviewed via
    git diff on write_set paths, router diffs, direct reads of both use-case files, and
    npx jest --config apps/meriter/test/jest-e2e.json --testPathPattern=investment.e2e-spec).

  intent_match: true
  write_set_compliance: partial
  files_modified:
    - api/apps/meriter/src/application/use-cases/investments/invest-in-post.use-case.ts
    - api/apps/meriter/src/application/use-cases/tappalka/process-tappalka-comparison.use-case.ts
    - api/apps/meriter/src/trpc/routers/investment.router.ts
    - api/apps/meriter/src/trpc/routers/tappalka.router.ts
  files_outside_write_set:
    - api/apps/meriter/src/trpc/routers/investment.router.ts
    - api/apps/meriter/src/trpc/routers/tappalka.router.ts

  constraint_checks:
    - id: phase-6
      status: pass
      evidence: >-
        BC-08 InvestInPostUseCase and BC-13 ProcessTappalkaComparisonUseCase live under
        application/use-cases/ with create*FromContext factories for tRPC wiring, matching
        prior phase use-case extraction patterns.
    - id: bounded_contexts-BC-08
      status: pass
      evidence: >-
        InvestInPostUseCase orchestrates wallet debit, publication pool update, and
        investment_received notification; documents inv-01 wallet-only debit and inv-08
        membership/post eligibility gates.
    - id: bounded_contexts-BC-13
      status: pass
      evidence: >-
        ProcessTappalkaComparisonUseCase wraps TappalkaService.submitChoice with inv-08
        membership/tappalka-enabled gates and show-cost eligibility pre-check before
        deductShowCost side effects.

  success_criteria:
    - id: investments_and_tappalka_delegate
      status: pass
      evidence: >-
        investment.router invest mutation calls createInvestInPostUseCaseFromContext(ctx).execute;
        tappalka.router submitChoice calls createProcessTappalkaComparisonUseCaseFromContext(ctx).execute.
        Read-only investment/tappalka procedures still delegate to domain services (outside scope).
    - id: investor_e2e_green
      status: blocked
      evidence: >-
        npx jest --config apps/meriter/test/jest-e2e.json --testPathPattern=investment.e2e-spec
        aborts at Nest bootstrap with RangeError: Maximum call stack size exceeded in
        InstanceWrapper.getInstanceByContextId (DI cycle). Failure occurs before any test
        body runs; worker notes it reproduces without this work-unit delta (likely p5 DI follow-up).
    - id: use_cases_extracted_with_gates
      status: pass
      evidence: >-
        Both use-case files exist; inv-08 gates run before wallet debit (invest) and before
        submitChoice (tappalka); inv-01 assertInvestorSolvency uses wallet.canAfford before
        addTransaction; tappalka assertPostsSolventForShowCost validates pool/rating paths.

  architecture_alignment:
    - id: gate-order-invest
      status: pass
      evidence: >-
        InvestInPostUseCase.execute: assertInvestPermission (inv-08) then assertInvestorSolvency
        (inv-01) then wallet debit and publication update. Adds membership gate not present in
        legacy InvestmentService.processInvestment.
    - id: gate-order-tappalka
      status: pass
      evidence: >-
        ProcessTappalkaComparisonUseCase.execute: assertComparisonPermission (inv-08 membership +
        tappalka enabled) then assertPostsSolventForShowCost then tappalkaService.submitChoice.
        Membership gate is new relative to TappalkaService (no prior getUserRoleInCommunity check).
    - id: invest-exception-layering
      status: pass
      evidence: >-
        InvestInPostUseCase uses Nest ForbiddenException/BadRequestException/NotFoundException;
        investment.router maps ForbiddenException to TRPC FORBIDDEN.
    - id: tappalka-exception-layering
      status: fail
      evidence: >-
        ProcessTappalkaComparisonUseCase imports TRPCError and throws FORBIDDEN/NOT_FOUND in
        application layer (inconsistent with InvestInPostUseCase and other phase use cases).
        tappalka.router catch (error instanceof Error) re-wraps all errors—including TRPCError
        from permission checks—as BAD_REQUEST, losing FORBIDDEN/NOT_FOUND semantics.
    - id: legacy-service-retention
      status: pass
      evidence: >-
        InvestmentService.processInvestment retained for platform-demo-seed.service.ts; tRPC invest
        path bypasses it via use case. Acceptable interim per worker notes.

  verification_checks:
    - id: invest_in_post_use_case_exists
      status: pass
    - id: process_tappalka_comparison_use_case_exists
      status: pass
    - id: inv_08_permission_gates_before_side_effects
      status: pass
    - id: inv_01_wallet_solvency_gate_on_invest
