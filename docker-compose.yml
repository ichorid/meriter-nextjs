services:
  mongodb:
    image: mongo:8
    container_name: meriter-mongodb
    restart: unless-stopped
    # Replica set + persisted auth require security.keyFile (see scripts/docker/mongo-docker-entry.sh).
    entrypoint: ["/bin/sh", "/scripts/mongo-docker-entry.sh"]
    command:
      [
        'mongod',
        '--replSet',
        'rs0',
        '--bind_ip_all',
        '--keyFile',
        '/var/lib/mongo-rs-key/mongo-rs.key',
      ]
    # Security: MongoDB port not exposed to host in production
    # Access only through Docker network
    # ports:
    #   - "27017:27017"
    env_file:
      - .env
    environment:
      - MONGO_INITDB_ROOT_USERNAME=admin
      - MONGO_INITDB_ROOT_PASSWORD=${MONGO_ADMIN_PASSWORD}
      - MONGO_INITDB_DATABASE=meriter
      # App password for init script (creates meriter_user)
      - MONGO_APP_PASSWORD=${MONGO_APP_PASSWORD}
    volumes:
      - mongodb_data:/data/db
      - mongo_rs_keyfile:/var/lib/mongo-rs-key
      - ./scripts/docker/mongo-docker-entry.sh:/scripts/mongo-docker-entry.sh:ro
      - ./mongodb-init:/docker-entrypoint-initdb.d:ro
    networks:
      - meriter-database-network
    # PRIMARY only: ping can pass before rs.initiate(); api also waits rs-init, but this matches real RS readiness.
    # start_period must cover rs-init-on-deploy.sh worst case (~120s connect + ~120s PRIMARY wait).
    # rs-init depends on service_started (not healthy) to avoid deadlock.
    healthcheck:
      test:
        - CMD-SHELL
        - mongosh --quiet -u "$$MONGO_INITDB_ROOT_USERNAME" -p "$$MONGO_INITDB_ROOT_PASSWORD" --authenticationDatabase admin --host 127.0.0.1 --port 27017 --eval 'try{const s=rs.status();if(s.myState===1)quit(0);quit(1)}catch(e){quit(1)}'
      interval: 5s
      timeout: 15s
      retries: 40
      start_period: 180s
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G
    security_opt:
      - no-new-privileges:true

  # Idempotent rs.initiate for volumes created before replSet + initdb.d (e.g. existing VPS data).
  # Requires Docker Compose v2 (depends_on: service_completed_successfully).
  mongodb-rs-init:
    image: mongo:8
    container_name: meriter-mongodb-rs-init
    restart: "no"
    env_file:
      - .env
    volumes:
      - ./mongodb-init/rs-init-every-deploy.js:/scripts/rs-init-every-deploy.js:ro
      - ./mongodb-init/rs-init-on-deploy.sh:/scripts/rs-init-on-deploy.sh:ro
    networks:
      - meriter-database-network
    depends_on:
      mongodb:
        condition: service_started
    entrypoint: ["/bin/sh", "/scripts/rs-init-on-deploy.sh"]
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 256M
    security_opt:
      - no-new-privileges:true

  api:
    image: ghcr.io/ichorid/meriter-nextjs-api:${VERSION_API:-latest}
    container_name: meriter-api
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - PORT=8002
      - NODE_ENV=production
      # MongoDB connection with authentication
      - MONGO_URL=mongodb://meriter_user:${MONGO_APP_PASSWORD}@mongodb:27017/meriter?authSource=meriter
    # Security: API port not exposed to host, only accessible through Caddy
    # ports:
    #   - "8002:8002"
    networks:
      - meriter-backend-network
      - meriter-database-network
    depends_on:
      mongodb:
        condition: service_healthy
      mongodb-rs-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "wget --quiet --tries=1 --spider http://127.0.0.1:8002/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp
      - /var/tmp

  bot-webhook-init:
    image: ghcr.io/ichorid/meriter-nextjs-api:${VERSION_API:-latest}
    container_name: meriter-bot-webhook-init
    restart: "no"
    env_file:
      - .env
    environment:
      - DOMAIN=${DOMAIN}
      - BOT_USERNAME=${BOT_USERNAME}
      - BOT_TOKEN=${BOT_TOKEN}
    depends_on:
      api:
        condition: service_started
    command: ["node", "scripts/setup-webhook.js", "set"]
    networks:
      - meriter-backend-network
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
    security_opt:
      - no-new-privileges:true

  s3-cors-init:
    image: ghcr.io/ichorid/meriter-nextjs-api:${VERSION_API:-latest}
    container_name: meriter-s3-cors-init
    restart: "no"
    env_file:
      - .env
    environment:
      - S3_ACCESS_KEY_ID=${S3_ACCESS_KEY_ID}
      - S3_SECRET_ACCESS_KEY=${S3_SECRET_ACCESS_KEY}
      - S3_ENDPOINT=${S3_ENDPOINT}
      - S3_REGION=${S3_REGION}
    depends_on:
      api:
        condition: service_started
    command: ["node", "scripts/configure-s3-cors.js", "${S3_BUCKET_NAME}", "${DOMAIN}"]
    networks:
      - meriter-backend-network
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
    security_opt:
      - no-new-privileges:true

  web:
    image: ghcr.io/ichorid/meriter-nextjs-web:${VERSION_WEB:-latest}
    container_name: meriter-web
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - PORT=8001
      - NODE_ENV=production
    # Security: Web port not exposed to host, only accessible through Caddy
    # ports:
    #   - "8001:8001"
    networks:
      - meriter-frontend-network
    healthcheck:
      test: ["CMD-SHELL", "wget --quiet --tries=1 --spider http://127.0.0.1:8001 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp
      - /var/tmp

  caddy:
    image: caddy:2.7-alpine
    container_name: meriter-caddy
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - meriter-frontend-network
      - meriter-backend-network
    depends_on:
      web:
        condition: service_healthy
      api:
        condition: service_healthy
    healthcheck:
      # Healthcheck uses the admin API inside the container (no redirects / TLS).
      test: ["CMD-SHELL", "wget --quiet --tries=1 --spider http://127.0.0.1:2019/config/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
    security_opt:
      - no-new-privileges:true
    # Caddy needs write access to /data and /config for certificates
    # read_only: true  # Cannot use read_only due to certificate storage

networks:
  # Frontend network: web and caddy
  meriter-frontend-network:
    driver: bridge
    internal: false
  # Backend network: api, init containers, and caddy
  meriter-backend-network:
    driver: bridge
    internal: false
  # Database network: mongodb and api only
  meriter-database-network:
    driver: bridge
    internal: true  # Isolated from other networks

volumes:
  mongodb_data:
    driver: local
  mongo_rs_keyfile:
    driver: local
  caddy_data:
    driver: local
  caddy_config:
    driver: local
